[build]
builder = "nixpacks"

[deploy]
startCommand = "python -c 'from app.db import engine; from app.models import Base; Base.metadata.create_all(engine)' && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
