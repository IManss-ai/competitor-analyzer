<div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-5 transition-shadow duration-150 hover:shadow-md"
     id="action-{{ item.action.id }}">

    <!-- Card header -->
    <div class="flex items-center justify-between mb-4 pb-3.5 border-b border-zinc-100">
        <div class="flex items-center gap-2.5 min-w-0">
            <span class="inline-block text-[11px] font-semibold uppercase tracking-wider px-2 py-1 rounded-md border
                {% if item.action.action_type == 'retention_email' %}badge-pricing
                {% elif item.action.action_type == 'feature_announcement' %}badge-feature
                {% elif item.action.action_type == 'positioning_update' %}badge-repositioning
                {% else %}badge-copy{% endif %}">
                {{ item.action.action_type | replace('_', ' ') }}
            </span>
            <span class="text-sm font-medium text-zinc-700 truncate">
                {{ item.competitor.name or item.competitor.url }}
            </span>
        </div>
        <span class="text-xs text-zinc-400 font-mono flex-shrink-0 ml-3">
            {{ item.action.created_at.strftime('%b %d') }}
        </span>
    </div>

    <!-- Change context quote -->
    {% if item.change_event.brief_text %}
    <div class="brief-quote mb-4">
        {{ item.change_event.brief_text }}
    </div>
    {% endif %}

    <!-- Editor form -->
    <form hx-post="/queue/{{ item.action.id }}/approve"
          hx-target="#action-{{ item.action.id }}"
          hx-swap="outerHTML swap:280ms"
          hx-on::after-request="if(event.detail.successful) window.notify('Asset approved — ready to use', 'success')"
          class="space-y-3.5">

        <div>
            <label for="draft-{{ item.action.id }}"
                   class="block text-xs font-medium text-zinc-500 uppercase tracking-wider mb-1.5">
                Response draft
            </label>
            <textarea name="edited_text"
                      id="draft-{{ item.action.id }}"
                      class="w-full text-sm text-zinc-800 bg-zinc-50 border border-zinc-200 rounded-lg p-3.5
                             min-h-[120px] focus:outline-none focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600
                             transition-colors duration-150 leading-relaxed resize-y"
            >{{ item.action.original_draft }}</textarea>
        </div>

        <!-- Action buttons -->
        <div class="flex items-center gap-2">

            <!-- Copy -->
            <button type="button"
                    id="copy-btn-{{ item.action.id }}"
                    onclick="const ta = document.getElementById('draft-{{ item.action.id }}');
                             navigator.clipboard.writeText(ta.value).then(() => {
                               const btn = document.getElementById('copy-btn-{{ item.action.id }}');
                               btn.textContent = 'Copied!';
                               btn.classList.add('text-emerald-700', 'border-emerald-200', 'bg-emerald-50');
                               setTimeout(() => {
                                 btn.textContent = 'Copy';
                                 btn.classList.remove('text-emerald-700', 'border-emerald-200', 'bg-emerald-50');
                               }, 2000);
                             })"
                    class="text-xs font-medium text-zinc-600 border border-zinc-200 bg-white
                           hover:bg-zinc-50 px-3.5 py-2 rounded-lg transition-all duration-150">
                Copy
            </button>

            <!-- Approve -->
            <button type="submit"
                    class="inline-flex items-center gap-1.5 text-xs font-medium bg-zinc-950 text-white px-3.5 py-2 rounded-lg
                           hover:bg-zinc-800 active:scale-[0.98] transition-all duration-150">
                <svg class="request-spinner w-3 h-3 animate-spin-css" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                <span class="request-label">Approve &amp; done</span>
            </button>

            <!-- Dismiss -->
            <button type="button"
                    hx-post="/queue/{{ item.action.id }}/dismiss"
                    hx-target="#action-{{ item.action.id }}"
                    hx-swap="outerHTML swap:280ms"
                    hx-on::after-request="if(event.detail.successful) window.notify('Dismissed', 'info')"
                    class="text-xs font-medium text-zinc-400 hover:text-zinc-600
                           hover:bg-zinc-50 px-3 py-2 rounded-lg transition-all duration-150">
                Dismiss
            </button>
        </div>
    </form>

</div>
