<div class="bg-white border border-slate-200 shadow-sm rounded-2xl p-6 transition duration-200" id="action-{{ item.action.id }}">
    
    <!-- Card Header -->
    <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-4">
        <div class="flex items-center space-x-2">
            <span class="text-xs font-bold uppercase tracking-wider text-indigo-900 bg-indigo-50 px-2.5 py-1 rounded-full">
                {{ item.action.action_type | replace("_", " ") }}
            </span>
            <span class="text-xs text-slate-400 font-medium">{{ item.competitor.name or item.competitor.url }}</span>
        </div>
        <span class="text-xs text-slate-400 font-medium">
            {{ item.action.created_at.strftime("%b %d") }}
        </span>
    </div>

    <!-- Brief description context -->
    {% if item.change_event.brief_text %}
    <div class="bg-slate-50 border-l-2 border-slate-300 p-3 mb-4 rounded-r-xl">
        <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider">Detected Change Brief</p>
        <p class="text-slate-600 text-sm mt-1 leading-relaxed italic">
            {{ item.change_event.brief_text }}
        </p>
    </div>
    {% endif %}

    <!-- Editor Form -->
    <form hx-post="/queue/{{ item.action.id }}/approve"
          hx-target="#action-{{ item.action.id }}"
          hx-swap="outerHTML"
          class="space-y-4">
        
        <div>
            <label for="draft-{{ item.action.id }}" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Edit Response Asset</label>
            <textarea name="edited_text" 
                      id="draft-{{ item.action.id }}" 
                      class="w-full text-sm text-slate-800 border border-slate-200 rounded-xl p-3 min-h-[120px] focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-transparent transition duration-150"
            >{{ item.action.original_draft }}</textarea>
        </div>

        <!-- Buttons -->
        <div class="flex items-center space-x-2">
            
            <!-- Copy button -->
            <button type="button"
                    id="copy-btn-{{ item.action.id }}"
                    onclick="navigator.clipboard.writeText(document.getElementById('draft-{{ item.action.id }}').value).then(() => {
                        const originalText = this.textContent;
                        this.textContent = 'Copied!';
                        this.classList.add('bg-emerald-50', 'text-emerald-700', 'border-emerald-200');
                        setTimeout(() => {
                            this.textContent = originalText;
                            this.classList.remove('bg-emerald-50', 'text-emerald-700', 'border-emerald-200');
                        }, 2000);
                    })"
                    class="px-4 py-2 text-xs bg-slate-100 hover:bg-slate-200 border border-slate-200 text-slate-700 font-semibold rounded-xl transition duration-150">
                Copy
            </button>

            <!-- Approve button -->
            <button type="submit"
                    class="px-4 py-2 text-xs bg-indigo-950 text-white font-semibold rounded-xl hover:bg-indigo-900 transition duration-150 shadow-sm">
                Approve &amp; Done
            </button>

            <!-- Dismiss button -->
            <button type="button"
                    hx-post="/queue/{{ item.action.id }}/dismiss"
                    hx-target="#action-{{ item.action.id }}"
                    hx-swap="outerHTML"
                    class="px-4 py-2 text-xs text-slate-400 hover:text-slate-600 hover:bg-slate-50 font-semibold rounded-xl transition duration-150">
                Dismiss
            </button>
        </div>
    </form>

</div>
